syntax = "proto3";

package pidgr.v1;

option go_package = "github.com/pidgr/pidgr-proto/gen/go/pidgr/v1;pidgrv1";

import "google/protobuf/timestamp.proto";

// ─── Enums ──────────────────────────────────────────────────────────────────

// Confidence level for cohort-level predictions, based on available data volume.
enum ConfidenceLevel {
  CONFIDENCE_LEVEL_UNSPECIFIED = 0;
  // Fewer than 50 campaigns — predictions based on heuristics/industry benchmarks.
  CONFIDENCE_LEVEL_LOW = 1;
  // 50-200 campaigns — basic clustering available, wide confidence intervals.
  CONFIDENCE_LEVEL_MEDIUM = 2;
  // 200+ campaigns — full ML pipeline, narrow confidence intervals.
  CONFIDENCE_LEVEL_HIGH = 3;
}

// Pipeline state for a group's archetypes. Lets the admin UI render
// distinct empty-state affordances ("run clustering" vs "need N more
// sessions" vs "pipeline ran but audience was too homogeneous") instead
// of treating every empty archetype list the same. Populated by
// InsightsService.GetGroupArchetypes.
enum PipelineState {
  PIPELINE_STATE_UNSPECIFIED = 0;
  // The ML pipeline has never fired for this org. Archetypes are
  // empty because nothing ran, not because of data shape.
  PIPELINE_STATE_NEVER_RUN = 1;
  // The pipeline ran but the group had fewer than the k-anonymization
  // minimum feature vectors (50), so clustering was skipped. UI
  // renders "keep running campaigns" affordance.
  PIPELINE_STATE_BELOW_THRESHOLD = 2;
  // The pipeline ran with enough vectors but the clustering provider
  // returned zero clusters — typically means the audience is too
  // homogeneous to separate into distinct archetypes.
  PIPELINE_STATE_NO_CLUSTERS = 3;
  // Archetypes are populated and ready to render.
  PIPELINE_STATE_READY = 4;
}

// ─── Messages ───────────────────────────────────────────────────────────────

// A behavioral archetype describing a cohort pattern (never an individual).
// Derived from k-anonymized, DP-noised behavioral feature vectors.
message Archetype {
  // Human-readable label (e.g., "Swift Acknowledger", "Thorough Reader").
  string label = 1;
  // Description of the behavioral pattern this archetype represents.
  string description = 2;
  // Proportion of the group that belongs to this archetype (0.0-1.0).
  float percentage = 3;
  // Centroid of the behavioral feature vector for this archetype.
  // Keys are dimension names (e.g., "tap_density", "engagement_depth").
  map<string, double> feature_centroid = 4;
}

// A cohort-level prediction for campaign acknowledgment rate.
// Never targets or scores individuals — always represents an audience aggregate.
message CohortPrediction {
  // Predicted ACK rate for the audience (0.0-1.0).
  float predicted_ack_rate = 1;
  // Lower bound of the confidence interval.
  float confidence_low = 2;
  // Upper bound of the confidence interval.
  float confidence_high = 3;
  // Confidence level based on available data volume.
  ConfidenceLevel confidence_level = 4;
  // Number of anonymous data points used for this prediction.
  int32 data_point_count = 5;
}

// Advisory information for campaign configuration, combining predictions and archetypes.
message CampaignAdvisory {
  // Cohort-level ACK prediction for the target audience.
  CohortPrediction predicted_ack = 1;
  // Suggested escalation delay in minutes based on historical cohort patterns.
  // 0 if insufficient data.
  int32 suggested_escalation_delay_minutes = 2;
  // Behavioral archetypes for the target audience.
  repeated Archetype archetypes = 3;
}

// Request to retrieve behavioral archetypes for a group.
message GetGroupArchetypesRequest {
  // ID of the group to query archetypes for. Required.
  string group_id = 1;
}

// Response containing behavioral archetypes for a group.
message GetGroupArchetypesResponse {
  // Behavioral archetypes for the group (empty if insufficient data).
  repeated Archetype archetypes = 1;
  // Number of anonymous feature vectors used for clustering.
  int32 data_point_count = 2;
  // Why `archetypes` looks the way it does. Lets the UI render a
  // distinct empty-state affordance for "never trained" vs
  // "below threshold" vs "no clusters" vs "ready". See PipelineState.
  PipelineState pipeline_state = 3;
}

// Request to predict cohort-level ACK rate for a campaign configuration.
message PredictCampaignACKRequest {
  // ID of the target audience group. Required.
  string group_id = 1;
  // Template type (optional, for prediction refinement).
  string template_type = 2;
  // Number of workflow steps (optional, for prediction refinement).
  int32 workflow_step_count = 3;
}

// Response containing a cohort-level ACK prediction.
message PredictCampaignACKResponse {
  // Cohort-level prediction.
  CohortPrediction prediction = 1;
}

// Request for campaign configuration advisory.
message GetCampaignAdvisoryRequest {
  // ID of the target audience group. Required.
  string group_id = 1;
  // Template ID (optional, for advisory context).
  string template_id = 2;
  // Template version (optional).
  int32 template_version = 3;
  // Number of workflow steps (optional).
  int32 workflow_step_count = 4;
}

// Response containing campaign advisory information.
message GetCampaignAdvisoryResponse {
  // Campaign advisory with prediction, suggested escalation, and archetypes.
  CampaignAdvisory advisory = 1;
}

// Request to generate an AI narrative for a group's insights.
message GetInsightNarrativeRequest {
  // ID of the group to generate a narrative for. Required.
  string group_id = 1;
  // Name of the prompt template to use (e.g., "campaign-advisory", "archetype-explanation").
  string prompt_name = 2;
}

// Response containing an AI-generated narrative.
message GetInsightNarrativeResponse {
  // AI-generated narrative text (Markdown formatted).
  string narrative = 1;
  // Timestamp when the narrative was generated.
  google.protobuf.Timestamp generated_at = 2;
  // Model identifier used for generation.
  string model_id = 3;
}

// Request to manually trigger the ML training pipeline.
// Empty — organization is extracted from the JWT.
message TriggerMLPipelineRequest {}

// Response after triggering the ML pipeline.
message TriggerMLPipelineResponse {
  // Remaining manual retrains allowed this month.
  int32 remaining_this_month = 1;
  // Timestamp of the last successful training (null if never trained).
  google.protobuf.Timestamp last_trained_at = 2;
}

// Request to manually retrigger archetype clustering for a single group
// without rerunning the full SageMaker training pipeline. Reuses the
// already-deployed clustering model.
message TriggerArchetypeClusteringRequest {
  // Group to recluster. Org is extracted from the JWT.
  string group_id = 1;
}

// Response after triggering archetype clustering for one group.
message TriggerArchetypeClusteringResponse {
  // Temporal workflow id — useful for client-side dedupe + operator
  // debugging via the Temporal UI.
  string workflow_id = 1;
  // Remaining manual retrains allowed this month. Shares the same
  // monthly counter as TriggerMLPipeline (ml_manual_limit_monthly).
  int32 remaining_this_month = 2;
  // Timestamp of the last successful archetype clustering for this
  // (org, group), null if never clustered.
  google.protobuf.Timestamp last_clustered_at = 3;
}

// ─── Service ────────────────────────────────────────────────────────────────

// Provides cohort-level AI insights for campaign planning and optimization.
// All predictions are aggregate — no individual-level profiling.
// Data is derived from k-anonymized, differential-privacy-noised behavioral features.
// All RPCs operate within the caller's org (extracted from JWT).
service InsightsService {
  // Retrieve behavioral archetypes for a group based on anonymous feature vectors.
  // Returns empty archetypes if insufficient data (cold start).
  // Authorization: Requires PERMISSION_CAMPAIGNS_READ.
  rpc GetGroupArchetypes(GetGroupArchetypesRequest) returns (GetGroupArchetypesResponse);
  // Predict cohort-level ACK rate for a campaign targeting a specific group.
  // Returns a confidence interval that narrows as more campaign data accumulates.
  // Authorization: Requires PERMISSION_CAMPAIGNS_READ.
  rpc PredictCampaignACK(PredictCampaignACKRequest) returns (PredictCampaignACKResponse);
  // Get campaign configuration advisory (prediction + suggested escalation + archetypes).
  // Advisory is informational only — never drives automated decisions.
  // Authorization: Requires PERMISSION_CAMPAIGNS_READ.
  rpc GetCampaignAdvisory(GetCampaignAdvisoryRequest) returns (GetCampaignAdvisoryResponse);
  // Generate an AI-powered narrative summary of a group's insights.
  // Combines archetype, prediction, and campaign data into human-readable analysis.
  // Authorization: Requires PERMISSION_CAMPAIGNS_READ.
  rpc GetInsightNarrative(GetInsightNarrativeRequest) returns (GetInsightNarrativeResponse);
  // Manually trigger the ML training pipeline for the caller's organization.
  // Rate-limited by ml_manual_limit_monthly (default 3 per month, auto-resets).
  // Authorization: Requires PERMISSION_ORGANIZATION_WRITE.
  rpc TriggerMLPipeline(TriggerMLPipelineRequest) returns (TriggerMLPipelineResponse);
  // Manually retrigger archetype clustering for a single group, reusing
  // the already-deployed SageMaker clustering model. Cheaper than a
  // full TriggerMLPipeline run because no training happens. Shares the
  // same ml_manual_limit_monthly quota as TriggerMLPipeline — callers
  // get N manual retrains per month across both RPCs.
  // Authorization: Requires PERMISSION_ORGANIZATION_WRITE.
  rpc TriggerArchetypeClustering(TriggerArchetypeClusteringRequest) returns (TriggerArchetypeClusteringResponse);
}
