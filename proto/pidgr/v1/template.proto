syntax = "proto3";

package pidgr.v1;

option go_package = "github.com/pidgr/pidgr-proto/gen/go/pidgr/v1;pidgrv1";

import "google/protobuf/timestamp.proto";
import "pidgr/v1/common.proto";

// ─── Enums ──────────────────────────────────────────────────────────────────

// Content format of a template, determining which editor and renderer to use.
enum TemplateType {
  // Default value; treated as MARKDOWN for backward compatibility.
  TEMPLATE_TYPE_UNSPECIFIED = 0;
  // Markdown with {{variable}} placeholders.
  TEMPLATE_TYPE_MARKDOWN = 1;
  // Rich text format (reserved for future use).
  TEMPLATE_TYPE_RICH = 2;
  // Raw HTML format (reserved for future use).
  TEMPLATE_TYPE_HTML = 3;
}

// Source from which a template variable's value is resolved at render time.
enum TemplateVariableSource {
  // Default value; treated as CUSTOM for backward compatibility.
  TEMPLATE_VARIABLE_SOURCE_UNSPECIFIED = 0;
  // Auto-resolved from the target user's profile attributes.
  TEMPLATE_VARIABLE_SOURCE_PROFILE = 1;
  // Provided manually in the campaign or workflow step configuration.
  TEMPLATE_VARIABLE_SOURCE_CUSTOM = 2;
}

// Review status of a template translation.
enum TranslationStatus {
  TRANSLATION_STATUS_UNSPECIFIED = 0;
  // Translation draft, not yet reviewed.
  TRANSLATION_STATUS_DRAFT = 1;
  // Translation generated by AI, pending human review.
  TRANSLATION_STATUS_AI_TRANSLATED = 2;
  // Translation is being reviewed by a human.
  TRANSLATION_STATUS_IN_REVIEW = 3;
  // Translation has been approved for use.
  TRANSLATION_STATUS_APPROVED = 4;
}

// ─── Messages ───────────────────────────────────────────────────────────────

// A variable placeholder within a template that gets substituted during rendering.
message TemplateVariable {
  // Variable name used in the template body (e.g. "employee_name").
  // Constraints: Max length 100 characters.
  string name = 1;
  // Human-readable description of what this variable represents.
  // Constraints: Max length 500 characters.
  string description = 2;
  // Whether this variable must be provided during rendering.
  bool required = 3;
  // Where this variable's value comes from (profile attribute or campaign config).
  TemplateVariableSource source = 4;
  // Fallback value used when the source does not provide a value.
  // Constraints: Max length 1000 characters.
  string default_value = 5;
  // When true, this variable's rendered value is masked in session replay
  // and heatmap screenshots. Org admin controls per variable.
  bool pii = 6;
}

// A versioned message template with variable placeholders.
// Templates are append-only — updates create new versions.
message Template {
  // Unique identifier for the template.
  string id = 1;
  // Human-readable template name (admin-facing label).
  // Constraints: Max length 200 characters.
  string name = 2;
  // Template body with {{variable}} placeholders for substitution.
  // Constraints: Max length 50000 characters.
  string body = 3;
  // Variables that can be substituted into the template body.
  repeated TemplateVariable variables = 4;
  // Version number (auto-incremented on each update).
  int32 version = 5;
  // Timestamp when this version was created.
  google.protobuf.Timestamp created_at = 6;
  // Timestamp of the most recent update (same as created_at for the latest version).
  google.protobuf.Timestamp updated_at = 7;
  // User-facing title shown as the message subject to recipients.
  // Serves as the default title; campaigns can override it.
  // Constraints: Max length 200 characters.
  string title = 8;
  // Content format of this template (markdown, rich, HTML).
  // UNSPECIFIED is treated as MARKDOWN for backward compatibility.
  TemplateType type = 9;
  // Language of the template body content (e.g., "en", "es", "ja").
  // Defaults to the org's default_locale, falling back to "en".
  // Translations are created as locale variants of this source.
  string source_locale = 10;
}

// A locale-specific translation of a template's title and body.
// Translations are created per template version and go through a review workflow.
message TemplateTranslation {
  // Unique identifier for this translation.
  string id = 1;
  // ID of the source template.
  string template_id = 2;
  // Version of the source template this translation is for.
  int32 version = 3;
  // Target locale (e.g., "es", "pt-BR", "zh", "ja").
  string locale = 4;
  // Translated title.
  // Constraints: Max length 200 characters.
  string title = 5;
  // Translated body content with {{variable}} placeholders preserved.
  // Constraints: Max length 50000 characters.
  string body = 6;
  // Current review status.
  TranslationStatus status = 7;
  // Who created this translation ("ai:bedrock", "ai:deepl", or user UUID).
  string translated_by = 8;
  // User who approved the translation. Empty until approved.
  string reviewed_by = 9;
  // When the translation was approved.
  google.protobuf.Timestamp reviewed_at = 10;
  // When the translation was created.
  google.protobuf.Timestamp created_at = 11;
}

// Request to create a new template.
message CreateTemplateRequest {
  // Human-readable template name (admin-facing label).
  // Constraints: Max length 200 characters.
  string name = 1;
  // Template body with {{variable}} placeholders.
  // Constraints: Max length 50000 characters.
  string body = 2;
  // Variables available for substitution in the body.
  repeated TemplateVariable variables = 3;
  // User-facing title shown as the message subject to recipients.
  // Constraints: Max length 200 characters.
  string title = 4;
  // Content format of the template. Defaults to MARKDOWN if unspecified.
  TemplateType type = 5;
  // Language of the template body content. Defaults to org's default_locale.
  // Valid values: en, es, pt-BR, zh, ja.
  string source_locale = 6;
}

// Response after creating a template.
message CreateTemplateResponse {
  // The newly created template (version 1).
  Template template = 1;
}

// Request to update a template, creating a new version.
message UpdateTemplateRequest {
  // ID of the template to update.
  string template_id = 1;
  // New template body with {{variable}} placeholders.
  // Constraints: Max length 50000 characters.
  string body = 2;
  // Updated variables for substitution.
  repeated TemplateVariable variables = 3;
}

// Response after updating a template.
message UpdateTemplateResponse {
  // The updated template with incremented version number.
  Template template = 1;
}

// Request to retrieve a specific template version.
message GetTemplateRequest {
  // ID of the template to retrieve.
  string template_id = 1;
  // Version to retrieve. 0 returns the latest version.
  int32 version = 2;
}

// Response containing the requested template.
message GetTemplateResponse {
  // The requested template.
  Template template = 1;
}

// Request to list templates with pagination.
message ListTemplatesRequest {
  // Pagination parameters.
  Pagination pagination = 1;
  // Filter by template type. UNSPECIFIED returns all templates.
  TemplateType type = 2;
}

// Response containing a page of templates.
message ListTemplatesResponse {
  // List of templates in this page (latest version of each).
  repeated Template templates = 1;
  // Pagination metadata for fetching subsequent pages.
  PaginationMeta pagination_meta = 2;
}

// Request to create a translation for a template.
message CreateTemplateTranslationRequest {
  // ID of the template to translate.
  string template_id = 1;
  // Version of the template to translate.
  int32 version = 2;
  // Target locale.
  string locale = 3;
  // Translated title.
  string title = 4;
  // Translated body content.
  string body = 5;
  // Who created this translation ("ai:bedrock" or user UUID).
  string translated_by = 6;
  // Initial status (typically DRAFT or AI_TRANSLATED).
  TranslationStatus status = 7;
}

// Response after creating a template translation.
message CreateTemplateTranslationResponse {
  // The created translation.
  TemplateTranslation translation = 1;
}

// Request to update an existing template translation.
message UpdateTemplateTranslationRequest {
  // ID of the translation to update.
  string translation_id = 1;
  // Updated title. Empty leaves unchanged.
  string title = 2;
  // Updated body. Empty leaves unchanged.
  string body = 3;
  // Updated status.
  TranslationStatus status = 4;
}

// Response after updating a template translation.
message UpdateTemplateTranslationResponse {
  // The updated translation.
  TemplateTranslation translation = 1;
}

// Request to list translations for a template version.
message ListTemplateTranslationsRequest {
  // ID of the template.
  string template_id = 1;
  // Version of the template. 0 returns translations for the latest version.
  int32 version = 2;
}

// Response containing all translations for a template version.
message ListTemplateTranslationsResponse {
  // Translations for the requested template version.
  repeated TemplateTranslation translations = 1;
}

// Request to approve a template translation.
message ApproveTemplateTranslationRequest {
  // ID of the translation to approve.
  string translation_id = 1;
}

// Response after approving a template translation.
message ApproveTemplateTranslationResponse {
  // The approved translation (status: APPROVED, reviewed_by and reviewed_at set).
  TemplateTranslation translation = 1;
}

// ─── Service ────────────────────────────────────────────────────────────────

// Manages versioned message templates used by campaigns.
// Templates are append-only — updates create new versions while preserving history.
service TemplateService {
  // Create a new template with a body and variable definitions.
  // Authorization: Requires MANAGER+ role.
  rpc CreateTemplate(CreateTemplateRequest) returns (CreateTemplateResponse);
  // Update an existing template, creating a new version.
  // Authorization: Requires MANAGER+ role.
  rpc UpdateTemplate(UpdateTemplateRequest) returns (UpdateTemplateResponse);
  // Retrieve a specific template by ID and optional version.
  // Authorization: Authenticated user within the organization.
  rpc GetTemplate(GetTemplateRequest) returns (GetTemplateResponse);
  // List all templates for the organization with pagination.
  // Authorization: Authenticated user within the organization.
  rpc ListTemplates(ListTemplatesRequest) returns (ListTemplatesResponse);
  // Create a locale-specific translation of a template.
  // Authorization: Requires PERMISSION_TEMPLATES_WRITE.
  rpc CreateTemplateTranslation(CreateTemplateTranslationRequest) returns (CreateTemplateTranslationResponse);
  // Update an existing template translation.
  // Authorization: Requires PERMISSION_TEMPLATES_WRITE.
  rpc UpdateTemplateTranslation(UpdateTemplateTranslationRequest) returns (UpdateTemplateTranslationResponse);
  // List all translations for a template version.
  // Authorization: Requires PERMISSION_TEMPLATES_READ.
  rpc ListTemplateTranslations(ListTemplateTranslationsRequest) returns (ListTemplateTranslationsResponse);
  // Approve a template translation for use in campaigns.
  // Authorization: Requires PERMISSION_TEMPLATES_REVIEW.
  rpc ApproveTemplateTranslation(ApproveTemplateTranslationRequest) returns (ApproveTemplateTranslationResponse);
}
