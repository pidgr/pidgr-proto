syntax = "proto3";

package pidgr.v1;

import "google/protobuf/timestamp.proto";
import "pidgr/v1/common.proto";

option go_package = "github.com/pidgr/pidgr-proto/gen/go/pidgr/v1;pidgrv1";

// ─── Messages ───────────────────────────────────────────────────────────────

// A campaign that delivers structured messages to a set of recipients
// and tracks their engagement through a workflow.
message Campaign {
  // Unique identifier for the campaign.
  // Constraints: UUID format (36 characters).
  string id = 1;
  // Human-readable campaign name.
  // Constraints: Max length 200 characters.
  string name = 2;
  // ID of the template used to render messages.
  // Constraints: UUID format (36 characters).
  string template_id = 3;
  // Pinned version of the template used for this campaign.
  int32 template_version = 4;
  // Object storage reference to the audience snapshot taken at campaign creation.
  string audience_snapshot_ref = 5;
  // Current lifecycle status of the campaign.
  CampaignStatus status = 6;
  // Workflow DAG that drives the campaign's automation logic.
  WorkflowDefinition workflow = 7;
  // Total number of recipients in the audience snapshot.
  int32 total_recipients = 8;
  // Number of recipients who completed the required action.
  int32 action_completed_count = 9;
  // Number of recipients who did not act before the deadline.
  int32 missed_count = 10;
  // Timestamp when the campaign was created.
  google.protobuf.Timestamp created_at = 11;
  // Timestamp when the campaign was started (workflow execution began).
  google.protobuf.Timestamp started_at = 12;
  // Timestamp when the campaign finished (completed, failed, or cancelled).
  google.protobuf.Timestamp completed_at = 13;
  // Display name of the sender shown to recipients (e.g. "HR Team").
  // Constraints: Max length 200 characters.
  string sender_name = 14;
  // Optional user-facing title override. If set, takes precedence over the template title.
  // Constraints: Max length 200 characters.
  string title = 15;
  // Whether this campaign's notifications break through Do Not Disturb / Focus mode.
  bool critical = 16;
  // Optional locale override for all recipients in this campaign.
  // When set, all recipients receive the campaign in this locale regardless of
  // their preferred_locale. Empty means per-recipient locale resolution.
  // Valid values: en, es, pt-BR, zh, ja.
  string default_locale = 17;
  // Whether the campaign deadline waits for users without registered devices.
  // When true, NO_DEVICE users remain in pending_count and can acknowledge
  // via inbox after installing the app. Default false preserves current behavior.
  bool wait_for_enrollment = 18;
  // Optional. Set when the campaign was created from a Compass archetype CTA.
  // Drives post-campaign archetype-response analytics.
  CampaignOriginatingArchetype originating_archetype = 19;
}

// Identifies the archetype that motivated the creation of a campaign.
// The audience is NOT filtered by archetype membership — this is metadata
// about the campaign's authoring intent only. See OpenSpec change
// archetype-targeted-campaign-cta.
message CampaignOriginatingArchetype {
  // UUID of the group whose archetype set the label belongs to.
  string group_id = 1;
  // Stable archetype label (e.g., "Swift Acknowledger"). Labels are stable
  // across clustering retrains; archetype IDs are not.
  string archetype_label = 2;
}

// A single audience member with optional per-user template variables.
message AudienceMember {
  // User ID (UUID).
  string user_id = 1;
  // Template variable values for this user (e.g. {"name": "Alice"}).
  map<string, string> variables = 2;
}

// Request to create a new campaign.
message CreateCampaignRequest {
  // Human-readable campaign name (admin-facing label).
  // Constraints: Max length 200 characters.
  string name = 1;
  // ID of the template to use for rendering messages.
  // Constraints: UUID format (36 characters).
  string template_id = 2;
  // Version of the template to pin for this campaign.
  int32 template_version = 3;
  // List of user IDs that form the campaign audience.
  // Constraints: Max 100000 items.
  repeated string user_ids = 4;
  // Workflow DAG defining the campaign's automation steps.
  WorkflowDefinition workflow = 5;
  // Display name of the sender shown to recipients (e.g. "HR Team").
  // Constraints: Max length 200 characters.
  string sender_name = 6;
  // Optional user-facing title override. If empty, the template title is used.
  // Constraints: Max length 200 characters.
  string title = 7;
  // Rich audience with per-user template variables.
  // When set, takes precedence over user_ids.
  // Constraints: Max 100000 items.
  repeated AudienceMember audience = 8;
  // Whether to include users with processing_restricted=true in the audience.
  // Default false: restricted users are excluded. Set true only with Art. 18(2) legal basis.
  bool include_restricted = 9;
  // Whether this campaign's notifications break through Do Not Disturb / Focus mode.
  bool critical = 10;
  // Optional locale override for all recipients.
  string default_locale = 11;
  // Whether the campaign deadline should wait for users without registered devices.
  // When true, NO_DEVICE users are not decremented from pending_count,
  // allowing them to acknowledge via inbox after installing the app.
  bool wait_for_enrollment = 12;
  // Optional. Set when the campaign is created from a Compass archetype CTA.
  // The server validates the caller has access to group_id and that
  // archetype_label exists in the group's current archetype set; cross-org
  // group_id returns PERMISSION_DENIED, unknown label returns NOT_FOUND.
  CampaignOriginatingArchetype originating_archetype = 13;
}

// Response after creating a campaign.
message CreateCampaignResponse {
  // The newly created campaign.
  Campaign campaign = 1;
}

// Request to start a campaign's workflow execution.
message StartCampaignRequest {
  // ID of the campaign to start.
  // Constraints: UUID format (36 characters).
  string campaign_id = 1;
}

// Response after starting a campaign.
message StartCampaignResponse {
  // The campaign with updated status.
  Campaign campaign = 1;
}

// Request to retrieve a single campaign by ID.
message GetCampaignRequest {
  // ID of the campaign to retrieve.
  // Constraints: UUID format (36 characters).
  string campaign_id = 1;
}

// Response containing the requested campaign.
message GetCampaignResponse {
  // The requested campaign.
  Campaign campaign = 1;
}

// Request to list campaigns with pagination.
message ListCampaignsRequest {
  // Pagination parameters.
  Pagination pagination = 1;
}

// Response containing a page of campaigns.
message ListCampaignsResponse {
  // List of campaigns in this page.
  repeated Campaign campaigns = 1;
  // Pagination metadata for fetching subsequent pages.
  PaginationMeta pagination_meta = 2;
}

// Request to cancel a running campaign.
message CancelCampaignRequest {
  // ID of the campaign to cancel.
  // Constraints: UUID format (36 characters).
  string campaign_id = 1;
}

// Response after cancelling a campaign.
message CancelCampaignResponse {
  // The campaign with updated status (CANCELLED).
  Campaign campaign = 1;
}

// Request to update a draft campaign (status must be CREATED).
// Only non-empty/non-zero fields are updated; omitted fields remain unchanged.
message UpdateCampaignRequest {
  // ID of the campaign to update.
  // Constraints: UUID format (36 characters).
  string campaign_id = 1;
  // Updated campaign name. Empty string means no change.
  // Constraints: Max length 200 characters.
  string name = 2;
  // Updated sender display name. Empty string means no change.
  // Constraints: Max length 200 characters.
  string sender_name = 3;
  // Updated title override. Empty string means no change.
  // Constraints: Max length 200 characters.
  string title = 4;
  // Updated template ID. Empty string means no change.
  // Constraints: UUID format (36 characters).
  string template_id = 5;
  // Updated template version. Zero means no change.
  int32 template_version = 6;
  // Updated workflow DAG. Null/omitted means no change.
  WorkflowDefinition workflow = 7;
}

// Response after updating a campaign.
message UpdateCampaignResponse {
  // The campaign with updated fields.
  Campaign campaign = 1;
}

// A single delivery record tracking message delivery to one recipient.
message Delivery {
  // Discriminator describing what produced this delivery row.
  enum Kind {
    // Default value; not a valid kind.
    KIND_UNSPECIFIED = 0;
    // Delivery generated for an audience recipient at campaign start.
    KIND_PRIMARY = 1;
    // Delivery generated by an escalation step targeting a non-audience user.
    KIND_ESCALATION = 2;
  }
  // Unique identifier for this delivery.
  // Constraints: UUID format (36 characters).
  string id = 1;
  // ID of the recipient user.
  // Constraints: UUID format (36 characters).
  string user_id = 2;
  // ID of the campaign this delivery belongs to.
  // Constraints: UUID format (36 characters).
  string campaign_id = 3;
  // Current delivery status.
  DeliveryStatus status = 4;
  // Timestamp when the message was delivered to the device.
  google.protobuf.Timestamp delivered_at = 5;
  // Timestamp when the recipient read the message.
  google.protobuf.Timestamp read_at = 6;
  // Timestamp when the recipient performed the required action.
  google.protobuf.Timestamp acted_at = 7;
  // Email address of the recipient, populated from the users table on read.
  string recipient_email = 8;
  // Discriminator distinguishing primary recipient deliveries from
  // deliveries generated by downstream workflow steps.
  Kind kind = 12;
  // For non-primary deliveries, the UUID of the originating delivery this
  // row was derived from. Empty for primary deliveries.
  // Constraints: UUID format (36 characters) when set.
  string parent_delivery_id = 13;
  // The locale this delivery's body was actually rendered in after fallback
  // resolution (recipient preference, campaign override, template default).
  // Valid values: en, es, pt-BR, zh, ja.
  string rendered_locale = 14;
}

// Request to list deliveries for a campaign with optional status filtering.
message ListDeliveriesRequest {
  // ID of the campaign to list deliveries for.
  // Constraints: UUID format (36 characters).
  string campaign_id = 1;
  // Optional filter by delivery status. UNSPECIFIED returns all.
  DeliveryStatus status_filter = 2;
  // Pagination parameters.
  Pagination pagination = 3;
}

// Response containing a page of delivery records.
message ListDeliveriesResponse {
  // List of deliveries in this page.
  repeated Delivery deliveries = 1;
  // Pagination metadata for fetching subsequent pages.
  PaginationMeta pagination_meta = 2;
}

// Request to compute the archetype-tendency-shift surface for a campaign:
// how each archetype's share of the originating group has moved between
// the snapshot closest to campaign-creation time and the most recent
// snapshot. Only valid for campaigns whose originating_archetype is set.
message GetCampaignArchetypeBreakdownRequest {
  // ID of the campaign to break down.
  // Constraints: UUID format (36 characters).
  string campaign_id = 1;
}

// Movement in one archetype's share of the originating group between the
// "before" and "after" archetype-clustering snapshots. Cohort-level only;
// no joining to user identity. The `is_origin` row is the archetype the
// campaign was authored for.
message ArchetypeShareShift {
  // Stable archetype label, e.g. "Swift Acknowledger".
  string label = 1;
  // Archetype's share of the group at the snapshot closest to (but not
  // after) the campaign's created_at. Range 0.0 – 1.0.
  double share_before = 2;
  // Archetype's share of the group at the most recent snapshot. Range
  // 0.0 – 1.0. Equals share_before when no clustering has run since.
  double share_after = 3;
  // True when this row's label matches the campaign's
  // originating_archetype.archetype_label.
  bool is_origin = 4;
}

// Response containing per-archetype share shifts. The admin renders
// these as a comparison table — origin row marked, others as peers, so
// the admin can tell campaign-coincident drift apart from background
// drift across the rest of the group.
message GetCampaignArchetypeBreakdownResponse {
  // One entry per archetype in the originating group. Empty when
  // insufficient_history is true.
  repeated ArchetypeShareShift shifts = 1;
  // When the "before" sample was taken (closest snapshot at or before
  // campaign creation).
  google.protobuf.Timestamp before_snapshot_at = 2;
  // When the "after" sample was taken (most recent snapshot).
  google.protobuf.Timestamp after_snapshot_at = 3;
  // True when fewer than two clustering snapshots exist for the group,
  // so no shift can be computed yet. Admin renders an "awaiting next
  // clustering cycle" empty state.
  bool insufficient_history = 4;
}

// ─── Service ────────────────────────────────────────────────────────────────

// Manages the full lifecycle of communication campaigns — creation,
// execution, monitoring, and cancellation.
service CampaignService {
  // Create a new campaign with a template, audience, and workflow.
  // Authorization: Requires MANAGER+ role.
  rpc CreateCampaign(CreateCampaignRequest) returns (CreateCampaignResponse);
  // Start a created campaign, triggering its workflow execution via the orchestration engine.
  // Authorization: Requires MANAGER+ role.
  rpc StartCampaign(StartCampaignRequest) returns (StartCampaignResponse);
  // Retrieve a single campaign by ID.
  // Authorization: Authenticated user within the organization.
  rpc GetCampaign(GetCampaignRequest) returns (GetCampaignResponse);
  // List campaigns for the organization with pagination.
  // Authorization: Authenticated user within the organization.
  rpc ListCampaigns(ListCampaignsRequest) returns (ListCampaignsResponse);
  // Update a draft campaign (CREATED status only). Non-empty fields overwrite existing values.
  // Authorization: Requires MANAGER+ role.
  rpc UpdateCampaign(UpdateCampaignRequest) returns (UpdateCampaignResponse);
  // Cancel a running campaign, stopping further deliveries and reminders.
  // Authorization: Requires MANAGER+ role.
  rpc CancelCampaign(CancelCampaignRequest) returns (CancelCampaignResponse);
  // List delivery records for a campaign, optionally filtered by status.
  // Authorization: Authenticated user within the organization.
  rpc ListDeliveries(ListDeliveriesRequest) returns (ListDeliveriesResponse);
  // Break down a campaign's recipients by current archetype membership
  // and return ack-rate per bucket, with k-anonymity gate applied.
  // Only valid for campaigns whose originating_archetype is set.
  // Authorization: Authenticated user within the organization.
  rpc GetCampaignArchetypeBreakdown(GetCampaignArchetypeBreakdownRequest) returns (GetCampaignArchetypeBreakdownResponse);
}
