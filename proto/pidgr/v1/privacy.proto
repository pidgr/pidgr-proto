syntax = "proto3";

package pidgr.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/pidgr/pidgr-proto/gen/go/pidgr/v1;pidgrv1";

// ─── Enums ──────────────────────────────────────────────────────────────────

// Status of a privacy request (export, delete, rectify, restrict).
enum PrivacyRequestStatus {
  // Default value; should not be used explicitly.
  PRIVACY_REQUEST_STATUS_UNSPECIFIED = 0;
  // Request has been created but not yet started.
  PRIVACY_REQUEST_STATUS_PENDING = 1;
  // Request is currently being processed.
  PRIVACY_REQUEST_STATUS_PROCESSING = 2;
  // Request completed successfully.
  PRIVACY_REQUEST_STATUS_COMPLETED = 3;
  // Request failed during processing.
  PRIVACY_REQUEST_STATUS_FAILED = 4;
}

// Detector-assigned severity of a security incident. Mirrors the staff-side
// incident taxonomy; the org feed exposes the same values read-only.
enum SecurityIncidentSeverity {
  // Default value; should not be used explicitly.
  SECURITY_INCIDENT_SEVERITY_UNSPECIFIED = 0;
  // Informational signal; no action expected.
  SECURITY_INCIDENT_SEVERITY_INFO = 1;
  // Anomalous signal under investigation.
  SECURITY_INCIDENT_SEVERITY_WARN = 2;
  // Confirmed or suspected breach-grade signal.
  SECURITY_INCIDENT_SEVERITY_BREACH = 3;
}

// Legal classification verdict recorded by platform staff during triage.
// Mirrors the staff-side incident taxonomy; immutable once set.
enum SecurityIncidentClassification {
  // Default value; should not be used explicitly.
  SECURITY_INCIDENT_CLASSIFICATION_UNSPECIFIED = 0;
  // Queued for triage; no verdict recorded yet.
  SECURITY_INCIDENT_CLASSIFICATION_PENDING = 1;
  // Triage concluded the incident is not a breach.
  SECURITY_INCIDENT_CLASSIFICATION_NOT_BREACH = 2;
  // Operational incident with no personal data involved.
  SECURITY_INCIDENT_CLASSIFICATION_OPERATIONAL_ONLY = 10;
  // Personal data breach (GDPR Art. 33 notification clock running).
  SECURITY_INCIDENT_CLASSIFICATION_PERSONAL_DATA_BREACH = 11;
  // Personal data breach with high risk to data subjects (GDPR Art. 34).
  SECURITY_INCIDENT_CLASSIFICATION_PERSONAL_DATA_BREACH_HIGH_RISK = 12;
}

// ─── Messages ───────────────────────────────────────────────────────────────

// Request to export all personal data associated with a user.
// Auth: Requires JWT. Callable by the user themselves or an org admin.
message ExportUserDataRequest {
  // Internal user ID whose data is being exported.
  // Constraints: UUID format (36 characters).
  string user_id = 1;
}

// Response containing the export status and download location.
message ExportUserDataResponse {
  // Current status of the export request.
  PrivacyRequestStatus status = 1;
  // Pre-signed S3 URL to download the exported data (ZIP format).
  // Only populated when status is COMPLETED.
  string result_url = 2;
  // Unique identifier for this export request.
  // Constraints: UUID format (36 characters).
  string export_id = 3;
}

// Request to export all data associated with the calling organization
// (GDPR Art. 20 data portability at the org level). The organization is
// extracted from the JWT — it is never in the request message.
// Auth: Requires JWT. Org admin only.
message ExportOrgDataRequest {}

// Response containing the org export status and download location.
// The export workflow assembles org configuration, users, campaigns,
// deliveries, and audit events into an encrypted bundle delivered via a
// pre-signed S3 URL.
message ExportOrgDataResponse {
  // Current status of the export request.
  PrivacyRequestStatus status = 1;
  // Pre-signed S3 URL to download the exported bundle (encrypted ZIP).
  // Only populated when status is COMPLETED.
  string result_url = 2;
  // Unique identifier for this export request.
  // Constraints: UUID format (36 characters).
  string export_id = 3;
}

// Request to delete or anonymize all personal data associated with a user.
// Auth: Requires JWT. Admin only.
message DeleteUserDataRequest {
  // Internal user ID whose data is being deleted.
  // Constraints: UUID format (36 characters).
  string user_id = 1;
  // When true, PII is replaced with placeholders instead of hard-deleted.
  // This preserves audit trail integrity while removing personal data.
  bool anonymize = 2;
}

// Response confirming the deletion request.
message DeleteUserDataResponse {
  // Current status of the deletion request.
  PrivacyRequestStatus status = 1;
  // Timestamp when deletion was completed (or scheduled).
  // Only populated when status is COMPLETED.
  google.protobuf.Timestamp deleted_at = 2;
  // Unique identifier for this deletion request.
  string request_id = 3;
}

// Request to list privacy requests for the organization.
// Auth: Requires JWT. Admin only.
message ListPrivacyRequestsRequest {
  // Maximum number of results per page.
  // Constraints: 1–100, default 25.
  int32 page_size = 1;
  // Continuation token from a previous response.
  string page_token = 2;
  // Filter by request type (export, delete, rectify, restrict). Empty = all.
  string request_type = 3;
  // Filter by status. UNSPECIFIED = all.
  PrivacyRequestStatus status = 4;
}

// Response containing privacy requests.
message ListPrivacyRequestsResponse {
  // The privacy requests matching the filters.
  repeated PrivacyRequest requests = 1;
  // Token for the next page. Empty if no more results.
  string next_page_token = 2;
}

// A privacy request record.
message PrivacyRequest {
  // Unique identifier.
  string id = 1;
  // The user this request applies to.
  string user_id = 2;
  // Email of the target user.
  string user_email = 3;
  // Type of request (export, delete, rectify, restrict).
  string request_type = 4;
  // Current status.
  PrivacyRequestStatus status = 5;
  // Whether to anonymize (true) or hard-delete (false). Only for delete requests.
  bool anonymize = 6;
  // Email of the admin who initiated this request.
  string requested_by_email = 7;
  // When the request was created.
  google.protobuf.Timestamp created_at = 8;
  // When the request was completed (if applicable).
  google.protobuf.Timestamp completed_at = 9;
  // Additional metadata (JSON).
  map<string, string> metadata = 10;
}

// Request to cancel a pending deletion.
// Auth: Requires JWT. Admin only.
message CancelDeletionRequest {
  // The privacy request ID to cancel.
  string request_id = 1;
  // Admin must type the target user's email to confirm.
  string confirmation_email = 2;
}

// Response confirming the cancellation.
message CancelDeletionResponse {
  // Updated status (should be FAILED with reason cancelled).
  PrivacyRequestStatus status = 1;
}

// Request to skip the grace period and delete immediately.
// Auth: Requires JWT. Admin only.
message ImmediateDeleteRequest {
  // The privacy request ID to expedite.
  string request_id = 1;
  // Admin must type the target user's email to confirm.
  string confirmation_email = 2;
}

// Response confirming the immediate deletion was triggered.
message ImmediateDeleteResponse {
  // Updated status (should be PROCESSING).
  PrivacyRequestStatus status = 1;
}

// Request to correct personal data for a user.
// Auth: Requires JWT. Callable by the user themselves or an org admin.
message RectifyUserDataRequest {
  // Internal user ID whose data is being corrected.
  // Constraints: UUID format (36 characters).
  string user_id = 1;
  // Map of field names to corrected values.
  // Corrections are propagated to all stored locations.
  // Constraints: Max 50 corrections per request.
  map<string, string> corrections = 2;
}

// Response listing which fields were successfully corrected.
message RectifyUserDataResponse {
  // Names of fields that were rectified.
  repeated string rectified_fields = 1;
}

// Request to restrict or unrestrict processing for a user.
// Auth: Requires JWT. Admin only.
message RestrictProcessingRequest {
  // Internal user ID whose processing is being restricted.
  // Constraints: UUID format (36 characters).
  string user_id = 1;
  // When true, processing is restricted. When false, restriction is lifted.
  bool restricted = 2;
}

// Response confirming the processing restriction status.
message RestrictProcessingResponse {
  // Current restriction status.
  bool restricted = 1;
  // Timestamp when the restriction was applied or removed.
  google.protobuf.Timestamp restricted_at = 2;
}

// Request to confirm whether personal data exists for a user.
// LGPD-specific: confirmação de existência (Art. 18, I).
// Auth: Requires JWT. Admin only.
message GetDataExistenceConfirmationRequest {
  // Internal user ID to check.
  // Constraints: UUID format (36 characters).
  string user_id = 1;
}

// Response confirming data existence and listing data categories.
message GetDataExistenceConfirmationResponse {
  // Whether any personal data exists for this user.
  bool exists = 1;
  // Categories of data stored (e.g., "profile", "deliveries", "analytics").
  repeated string data_categories = 2;
}

// Request to list the calling user's own privacy requests.
// Auth: Requires JWT. No admin permission required — returns only the caller's requests.
message ListMyPrivacyRequestsRequest {
  // Maximum number of results per page.
  // Constraints: 1–100, default 25.
  int32 page_size = 1;
  // Continuation token from a previous response.
  string page_token = 2;
  // Filter by request type (export, rectify). Empty = all.
  string request_type = 3;
  // Filter by status. UNSPECIFIED = all.
  PrivacyRequestStatus status = 4;
}

// Response containing the calling user's privacy requests.
message ListMyPrivacyRequestsResponse {
  // The privacy requests belonging to the calling user.
  repeated PrivacyRequest requests = 1;
  // Token for the next page. Empty if no more results.
  string next_page_token = 2;
}

// A security incident that touched the calling organization. Org-facing
// read-only subset of the staff-side incident record — internal triage
// fields (detector signal, classifier identity, evidence pointers) are
// intentionally not exposed.
message OrgSecurityIncident {
  // Unique identifier for the incident.
  // Constraints: UUID format (36 characters).
  string id = 1;
  // When the observability platform detected the incident. The canonical
  // anchor for the 72-hour GDPR Art. 33 notification clock.
  google.protobuf.Timestamp detected_at = 2;
  // Detector-assigned severity.
  SecurityIncidentSeverity severity = 3;
  // Legal classification verdict. PENDING until staff triage completes.
  SecurityIncidentClassification classification = 4;
  // When the regulator was notified. Empty if no notification was required
  // or it has not happened yet.
  google.protobuf.Timestamp notified_at = 5;
  // When the incident was resolved. Empty while still open.
  google.protobuf.Timestamp resolved_at = 6;
}

// Request to list security incidents that touched the calling organization.
// The organization is extracted from the JWT — it is never in the request.
// Auth: Requires JWT. Admin only.
message ListOrgSecurityIncidentsRequest {
  // Maximum number of results per page.
  // Constraints: 1–100, default 25.
  int32 page_size = 1;
  // Continuation token from a previous response.
  string page_token = 2;
}

// Response containing the organization's security incident feed.
message ListOrgSecurityIncidentsResponse {
  // Incidents that touched the organization, ordered by detected_at
  // descending (newest first).
  repeated OrgSecurityIncident incidents = 1;
  // Token for the next page. Empty if no more results.
  string next_page_token = 2;
}

// ─── Service ────────────────────────────────────────────────────────────────

// PrivacyService handles GDPR/LGPD data subject rights.
// All RPCs extract org_id from the JWT — it is never in request messages.
service PrivacyService {
  // Export all personal data associated with a user as a downloadable ZIP.
  // Async operation — returns immediately with PENDING status, sends push
  // notification when the export is ready.
  // Auth: Requires JWT. Callable by the user themselves or an org admin.
  rpc ExportUserData(ExportUserDataRequest) returns (ExportUserDataResponse);

  // Export all data associated with the calling organization as an encrypted
  // bundle (GDPR Art. 20). The workflow assembles org configuration, users,
  // campaigns, deliveries, and audit events; the bundle is delivered via a
  // pre-signed S3 URL. Async operation — returns immediately with PENDING
  // status and an export_id to poll.
  // Auth: Requires JWT. Org admin only.
  rpc ExportOrgData(ExportOrgDataRequest) returns (ExportOrgDataResponse);

  // Delete or anonymize all personal data associated with a user.
  // Deletion has a 30-day grace period during which processing is restricted
  // and the request can be cancelled. After 30 days, deletion is irreversible.
  // Auth: Requires JWT. Admin only.
  rpc DeleteUserData(DeleteUserDataRequest) returns (DeleteUserDataResponse);

  // Correct personal data for a user. Propagates corrections to all stored
  // locations (profile, delivery records, analytics metadata).
  // Auth: Requires JWT. Callable by the user themselves or an org admin.
  rpc RectifyUserData(RectifyUserDataRequest) returns (RectifyUserDataResponse);

  // Restrict or unrestrict processing for a user. When restricted, the API
  // skips this user in campaigns, analytics, and session replay.
  // Auth: Requires JWT. Admin only.
  rpc RestrictProcessing(RestrictProcessingRequest) returns (RestrictProcessingResponse);

  // Confirm whether personal data exists for a user and list data categories.
  // LGPD-specific: confirmação de existência (Art. 18, I).
  // Auth: Requires JWT. Admin only.
  rpc GetDataExistenceConfirmation(GetDataExistenceConfirmationRequest) returns (GetDataExistenceConfirmationResponse);

  // List privacy requests for the organization, with optional filters.
  // Used by the admin UI to show scheduled deletions table.
  // Auth: Requires JWT. Admin only.
  rpc ListPrivacyRequests(ListPrivacyRequestsRequest) returns (ListPrivacyRequestsResponse);

  // Cancel a pending deletion request. Reactivates the user and aborts
  // the deletion workflow. Only valid during the 30-day grace period.
  // Auth: Requires JWT. Admin only.
  rpc CancelDeletion(CancelDeletionRequest) returns (CancelDeletionResponse);

  // Skip the grace period and delete immediately. Signals the deletion
  // workflow to proceed without waiting for the 30-day timer.
  // Auth: Requires JWT. Admin only.
  rpc ImmediateDelete(ImmediateDeleteRequest) returns (ImmediateDeleteResponse);

  // List the calling user's own privacy requests (export, rectify).
  // The server extracts user_id from the JWT — no admin permission required.
  // Auth: Requires JWT. Any authenticated user.
  rpc ListMyPrivacyRequests(ListMyPrivacyRequestsRequest) returns (ListMyPrivacyRequestsResponse);

  // List security incidents that touched the calling organization, newest
  // first. Read-only org-facing subset of the staff incident queue — used by
  // the admin breach feed (GDPR Art. 33/34 transparency).
  // Auth: Requires JWT. Admin only.
  rpc ListOrgSecurityIncidents(ListOrgSecurityIncidentsRequest) returns (ListOrgSecurityIncidentsResponse);
}
