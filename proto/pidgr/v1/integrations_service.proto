syntax = "proto3";

package pidgr.v1;

import "google/protobuf/timestamp.proto";
import "pidgr/v1/channel_events.proto";
import "pidgr/v1/integrations.proto";

option go_package = "github.com/pidgr/pidgr-proto/gen/go/pidgr/v1;pidgrv1";

// ─── DispatchToChannel ──────────────────────────────────────────────────────

// Worker-mode entry point invoked by the Temporal worker for one recipient.
// Idempotent on `dispatch_id`: if a `(dispatch_id, SENT)` row already exists
// in `channel_dispatches`, the worker SHALL return DISPATCH_STATUS_DEDUPED
// without re-invoking the channel adapter.
message DispatchToChannelRequest {
  // Idempotency key. Must be stable across retries from pidgr-api side.
  string dispatch_id = 1;
  string org_id = 2;
  string user_id = 3;
  // Which channel adapter to invoke (EMAIL is the Wave 1 implementation).
  ChannelName channel = 4;
  // Template to render before dispatch.
  string template_id = 5;
  // Per-recipient template variables.
  map<string, string> template_vars = 6;
  // BCP-47 locale used to select the template translation.
  string locale = 7;
  // Optional AWS region the worker MUST dispatch from (typically copied from
  // the recipient's reachability row). Unset means "no constraint."
  optional string region_constraint = 8;
}

message DispatchToChannelResponse {
  // Echoes back the request's `dispatch_id`.
  string dispatch_id = 1;
  // Terminal outcome of this call.
  DispatchStatus status = 2;
  // Human-readable failure reason; set only when `status` is
  // DISPATCH_STATUS_FAILED.
  optional string failure_reason = 3;
}

// ─── UpsertReachability ─────────────────────────────────────────────────────

// Records a recipient identifier for a (user, channel) tuple. The plaintext
// identifier is column-level KMS-encrypted on insert and never logged or
// returned. The server computes the org-scoped HMAC lookup hash so opt-out
// webhooks can find the row without decrypt.
message UpsertReachabilityRequest {
  string org_id = 1;
  string user_id = 2;
  ChannelName channel = 3;
  // The plaintext identifier (email address, phone number, Slack user ID,
  // Telegram chat ID, etc.). Encrypted at rest server-side. Servers MUST NOT
  // log this field. Clients SHOULD treat this message as sensitive.
  string identifier_plaintext = 4;
  // Optional AWS region this user's data must remain in (e.g. "eu-west-1").
  // Recorded but NOT enforced at write time; enforcement is at dispatch.
  optional string region_constraint = 5;
}

message UpsertReachabilityResponse {
  // The metadata for the upserted row. Plaintext identifier and envelope
  // ciphertext are intentionally absent.
  Reachability reachability = 1;
}

// ─── RemoveReachability ─────────────────────────────────────────────────────

// Idempotent removal. GDPR Recital 30 audit row is appended via internal-mTLS
// BEFORE the registry row is deleted (see AuditService.Append). If no row
// existed, `removed = false` and no audit row is emitted.
message RemoveReachabilityRequest {
  string org_id = 1;
  string user_id = 2;
  ChannelName channel = 3;
}

message RemoveReachabilityResponse {
  // True if a row was deleted. False if no row existed for the tuple
  // (idempotent success).
  bool removed = 1;
}

// ─── GetReachability ────────────────────────────────────────────────────────

// Returns the reachability metadata for a single (user, channel) tuple.
// Returns NOT_FOUND if no row exists.
message GetReachabilityRequest {
  string org_id = 1;
  string user_id = 2;
  ChannelName channel = 3;
}

message GetReachabilityResponse {
  // Plaintext identifier and envelope ciphertext are intentionally absent.
  Reachability reachability = 1;
}

// ─── ListReachabilityForUser ────────────────────────────────────────────────

// Returns one Reachability entry per channel configured for a (org, user)
// pair. Used by the admin-side per-user matrix view. Plaintext identifiers
// and envelope ciphertext are intentionally absent — the admin UI only needs
// to know which channels are configured.
message ListReachabilityForUserRequest {
  string org_id = 1;
  string user_id = 2;
}

message ListReachabilityForUserResponse {
  // One entry per channel that has a row for the (org_id, user_id) pair.
  repeated Reachability reachabilities = 1;
}

// ─── GetRegionPolicy / SetRegionPolicy ──────────────────────────────────────

message GetRegionPolicyRequest {
  string org_id = 1;
  ChannelName channel = 2;
}

message GetRegionPolicyResponse {
  // Always populated. Empty `allowed_regions` means "no policy configured"
  // — NOT "no regions allowed."
  RegionPolicy policy = 1;
}

// Admin-only upsert. Empty `allowed_regions` clears the policy.
message SetRegionPolicyRequest {
  string org_id = 1;
  ChannelName channel = 2;
  // AWS region identifiers (e.g. "eu-west-1"). Empty list == "no policy."
  repeated string allowed_regions = 3;
}

message SetRegionPolicyResponse {
  RegionPolicy policy = 1;
}

// ─── GetCostCapPolicy / SetCostCapPolicy ────────────────────────────────────

// Get the cost-cap state for the current calendar-month period (UTC). When
// no row exists for `(org_id, channel, period_yyyymm)`, the server returns
// the channel default cap from server config
// (`COST_CAP_DEFAULT_${CHANNEL}_MICROS`) with `used_micros = 0`.
message GetCostCapPolicyRequest {
  string org_id = 1;
  ChannelName channel = 2;
}

message GetCostCapPolicyResponse {
  string org_id = 1;
  ChannelName channel = 2;
  // Current period's cap in micros (1/1_000_000 of a USD).
  int64 cap_micros = 3;
  // Current period's accumulated spend in micros.
  int64 used_micros = 4;
  // Calendar-month period in integer YYYYMM form (e.g. 202605 for May 2026).
  int32 period_yyyymm = 5;
}

// Admin-only upsert of the cap for the current calendar-month period. Future
// periods inherit the most recent SetCostCapPolicy value until the next call.
message SetCostCapPolicyRequest {
  string org_id = 1;
  ChannelName channel = 2;
  int64 cap_micros = 3;
}

message SetCostCapPolicyResponse {
  string org_id = 1;
  ChannelName channel = 2;
  int64 cap_micros = 3;
  int64 used_micros = 4;
  int32 period_yyyymm = 5;
}

// ─── GetOrgWebhookConfig / SetOrgWebhookConfig ──────────────────────────────

// Get the org's generic-webhook channel configuration. The shared secret is
// write-only and never returned — `has_secret` reports whether one is set.
message GetOrgWebhookConfigRequest {
  string org_id = 1;
}

message GetOrgWebhookConfigResponse {
  string org_id = 1;
  // Destination URL Pidgr POSTs notification events to. Empty when no
  // configuration exists.
  string url = 2;
  // Whether dispatch via the WEBHOOK channel is enabled for the org.
  bool enabled = 3;
  // Whether a signing secret is currently configured. The secret itself is
  // never returned.
  bool has_secret = 4;
  google.protobuf.Timestamp created_at = 5;
  google.protobuf.Timestamp updated_at = 6;
}

// Admin-only upsert of the org's generic-webhook configuration. The server
// validates the URL (https-only, public addresses only) before persisting,
// and envelope-encrypts the secret at rest. Setting a new `secret` rotates
// it; leaving `secret` unset keeps the existing one.
message SetOrgWebhookConfigRequest {
  string org_id = 1;
  // Destination URL. Constraints: https scheme; non-private, non-loopback
  // host. Validation failures return `invalid_argument`.
  string url = 2;
  bool enabled = 3;
  // Shared secret used for the `X-Pidgr-Signature` HMAC-SHA256 header.
  // Write-only. Unset keeps the current secret; set rotates it.
  // Constraints: 16–256 bytes when set.
  optional string secret = 4;
}

message SetOrgWebhookConfigResponse {
  string org_id = 1;
  string url = 2;
  bool enabled = 3;
  bool has_secret = 4;
  google.protobuf.Timestamp created_at = 5;
  google.protobuf.Timestamp updated_at = 6;
}

// ─── CreateChannelConnectLink ───────────────────────────────────────────────

// Mints a short-lived, HMAC-signed opt-in link a user follows to bind a
// third-party channel to their (org, user). Only follow-style channels are
// accepted: CHANNEL_NAME_TELEGRAM (bot-follow), CHANNEL_NAME_SLACK (OAuth),
// CHANNEL_NAME_LINE (follow-code). Any other channel is rejected server-side
// with `invalid_argument`. Wraps the pidgr-api `internal/linktoken` minter.
message CreateChannelConnectLinkRequest {
  string org_id = 1;
  // Internal user UUID; resolved via UserResolver on the server. The minted
  // token binds the resulting channel identifier to this (org, user).
  string user_id = 2;
  // Channel to connect. Constraints: must be one of CHANNEL_NAME_TELEGRAM,
  // CHANNEL_NAME_SLACK, CHANNEL_NAME_LINE. Other values return
  // `invalid_argument`.
  ChannelName channel = 3;
}

message CreateChannelConnectLinkResponse {
  // The deep link the client renders for the user to follow (e.g. a
  // Telegram bot-follow URL, Slack OAuth authorize URL, or LINE follow URL).
  string connect_url = 1;
  // The raw 64-char base64url opt-in token embedded in `connect_url`,
  // surfaced separately so clients can render it as a QR code or copy
  // button. Implementation detail — clients SHOULD NOT parse or mutate it.
  string token = 2;
  // When the minted token expires. After this time the link no longer
  // binds and the user must request a fresh one.
  google.protobuf.Timestamp expires_at = 3;
}

// ─── Service ────────────────────────────────────────────────────────────────

// IntegrationsService is the gRPC surface of the pidgr-integrations service.
//
// Auth model:
//   - DispatchToChannel: internal-mTLS only. Called by the Temporal worker
//     on behalf of pidgr-api dispatch activities. Never exposed publicly.
//   - UpsertReachability / RemoveReachability / GetReachability /
//     ListReachabilityForUser: Cognito JWT (admin RPCs, org-scoped on the
//     caller's `custom:org_id` claim).
//   - GetRegionPolicy / SetRegionPolicy / GetCostCapPolicy /
//     SetCostCapPolicy / GetOrgWebhookConfig / SetOrgWebhookConfig /
//     CreateChannelConnectLink: Cognito JWT (admin only, org-scoped).
//
// Cross-org access is denied with `permission_denied`.
service IntegrationsService {
  // Dispatch a single rendered message to one channel. Idempotent on
  // `dispatch_id`. Internal-mTLS only.
  rpc DispatchToChannel(DispatchToChannelRequest) returns (DispatchToChannelResponse);

  // Upsert a reachability identifier for a (user, channel) tuple. Encrypts
  // and HMAC-hashes server-side before insert; emits a `REACHABILITY_UPSERT`
  // audit row BEFORE the registry commit.
  rpc UpsertReachability(UpsertReachabilityRequest) returns (UpsertReachabilityResponse);

  // Remove a reachability identifier. Idempotent. Emits a
  // `REACHABILITY_REMOVE` audit row BEFORE the registry delete.
  rpc RemoveReachability(RemoveReachabilityRequest) returns (RemoveReachabilityResponse);

  // Read a single reachability row's metadata. Returns NOT_FOUND if missing.
  // Does not return plaintext or envelope ciphertext.
  rpc GetReachability(GetReachabilityRequest) returns (GetReachabilityResponse);

  // List per-channel reachability metadata for a single user. Used by the
  // admin per-user matrix view. Does not return plaintext or ciphertext.
  rpc ListReachabilityForUser(ListReachabilityForUserRequest) returns (ListReachabilityForUserResponse);

  // Read the per-(org, channel) region allowlist. Returns an empty list when
  // no policy is configured — NOT a NOT_FOUND.
  rpc GetRegionPolicy(GetRegionPolicyRequest) returns (GetRegionPolicyResponse);

  // Admin-only upsert of the per-(org, channel) region allowlist.
  rpc SetRegionPolicy(SetRegionPolicyRequest) returns (SetRegionPolicyResponse);

  // Read the current calendar-month cost-cap state. Returns the channel
  // default cap when no row exists; never NOT_FOUND.
  rpc GetCostCapPolicy(GetCostCapPolicyRequest) returns (GetCostCapPolicyResponse);

  // Admin-only upsert of the current calendar-month cost cap.
  rpc SetCostCapPolicy(SetCostCapPolicyRequest) returns (SetCostCapPolicyResponse);

  // Read the org's generic-webhook channel configuration. The signing secret
  // is never returned. Returns an empty-url config when none exists — NOT a
  // NOT_FOUND.
  rpc GetOrgWebhookConfig(GetOrgWebhookConfigRequest) returns (GetOrgWebhookConfigResponse);

  // Admin-only upsert of the org's generic-webhook configuration. Validates
  // the destination URL (https-only, public hosts) and envelope-encrypts the
  // secret at rest.
  rpc SetOrgWebhookConfig(SetOrgWebhookConfigRequest) returns (SetOrgWebhookConfigResponse);

  // CreateChannelConnectLink mints a short-lived, HMAC-signed opt-in link a
  // user follows to bind a third-party channel (Telegram bot-follow, Slack
  // OAuth, LINE follow-code) to their (org, user). Wraps the api-side
  // internal/linktoken minter. Channels other than TELEGRAM, SLACK, and LINE
  // are rejected with `invalid_argument`.
  rpc CreateChannelConnectLink(CreateChannelConnectLinkRequest) returns (CreateChannelConnectLinkResponse);
}
