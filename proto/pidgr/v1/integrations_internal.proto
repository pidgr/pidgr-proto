syntax = "proto3";

package pidgr.v1;

option go_package = "github.com/pidgr/pidgr-proto/gen/go/pidgr/v1;pidgrv1";

// ─── PurgeOrg ───────────────────────────────────────────────────────────────

// Request to purge ALL of an org's integrations data. Invoked only by
// pidgr-api's staff `ForceDeleteOrg` during an org wipe.
message PurgeOrgRequest {
  // The org whose integrations data is to be deleted.
  string org_id = 1;
  // Required, non-empty staff-supplied justification for the wipe. Propagated
  // for audit so the destructive purge is attributable.
  string reason = 2;
}

message PurgeOrgResponse {
  // Number of `reachability_registry` rows deleted for the org.
  int64 reachabilities_deleted = 1;
  // Number of `channel_dispatches` rows deleted for the org.
  int64 dispatches_deleted = 2;
  // Number of policy rows deleted for the org: the `cost_cap_state` and
  // `region_policy` rows combined.
  int64 policies_deleted = 3;
}

// ─── Service ────────────────────────────────────────────────────────────────

// IntegrationsInternalService is the internal-only gRPC surface of the
// pidgr-integrations service. It is kept SEPARATE from the customer-proxied
// `IntegrationsService` (in integrations_service.proto) so that a destructive
// platform operation is not mixed with the reachability/dispatch RPCs.
//
// Auth model:
//   - PurgeOrg: internal-mTLS only (subject allowlist). Has no customer
//     analog and is never exposed publicly. Called only by pidgr-api's staff
//     `ForceDeleteOrg`.
service IntegrationsInternalService {
  // Purge ALL of an org's integrations data (reachability registry, channel
  // dispatches, cost-cap state, region policy). Invoked only by pidgr-api's
  // staff `ForceDeleteOrg` during an org wipe. Idempotent: purging an org with
  // no remaining data succeeds and returns zero counts. Internal-mTLS only.
  rpc PurgeOrg(PurgeOrgRequest) returns (PurgeOrgResponse);
}
