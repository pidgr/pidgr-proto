syntax = "proto3";

package pidgr.v1;

option go_package = "github.com/pidgr/pidgr-proto/gen/go/pidgr/v1;pidgrv1";

import "google/protobuf/timestamp.proto";
import "pidgr/v1/privacy.proto";

// ─── Enums ──────────────────────────────────────────────────────────────────

// Type of auditable platform action.
enum AuditEventType {
  // Default value; should not be used explicitly.
  AUDIT_EVENT_TYPE_UNSPECIFIED = 0;

  // ── Campaign lifecycle ───────────────────────────────────────────────────
  // A campaign was created.
  AUDIT_EVENT_TYPE_CAMPAIGN_CREATED = 1;
  // A message was sent to a recipient.
  AUDIT_EVENT_TYPE_MESSAGE_SENT = 2;
  // A message was opened by a recipient.
  AUDIT_EVENT_TYPE_MESSAGE_OPENED = 3;
  // A recipient acknowledged a campaign.
  AUDIT_EVENT_TYPE_ACK_REGISTERED = 4;
  // An escalation was triggered by the workflow.
  AUDIT_EVENT_TYPE_ESCALATION_EXECUTED = 5;
  // A campaign was started.
  AUDIT_EVENT_TYPE_CAMPAIGN_STARTED = 12;
  // A campaign was cancelled.
  AUDIT_EVENT_TYPE_CAMPAIGN_CANCELLED = 13;
  // A campaign was updated.
  AUDIT_EVENT_TYPE_CAMPAIGN_UPDATED = 14;

  // ── User lifecycle ───────────────────────────────────────────────────────
  // A user was invited to the organization.
  AUDIT_EVENT_TYPE_USER_INVITED = 6;
  // A user was deactivated.
  AUDIT_EVENT_TYPE_USER_DEACTIVATED = 7;
  // A user was reactivated.
  AUDIT_EVENT_TYPE_USER_REACTIVATED = 15;
  // A user's role was changed (assigned to a different role).
  AUDIT_EVENT_TYPE_ROLE_CHANGED = 10;
  // A user's invite was revoked.
  AUDIT_EVENT_TYPE_INVITE_REVOKED = 16;
  // A user's profile was updated.
  AUDIT_EVENT_TYPE_PROFILE_UPDATED = 17;
  // A user's settings were updated.
  AUDIT_EVENT_TYPE_SETTINGS_UPDATED = 18;
  // A user enrolled a passkey.
  AUDIT_EVENT_TYPE_PASSKEY_ENROLLED = 19;

  // ── GDPR / Privacy ──────────────────────────────────────────────────────
  // A data export was requested (GDPR Art. 15).
  AUDIT_EVENT_TYPE_DATA_EXPORT_REQUESTED = 8;
  // A data deletion was requested (GDPR Art. 17).
  AUDIT_EVENT_TYPE_DATA_DELETION_REQUESTED = 9;
  // User data was rectified (GDPR Art. 16).
  AUDIT_EVENT_TYPE_DATA_RECTIFIED = 20;
  // Data processing was restricted (GDPR Art. 18).
  AUDIT_EVENT_TYPE_PROCESSING_RESTRICTED = 21;
  // A scheduled deletion was cancelled.
  AUDIT_EVENT_TYPE_DELETION_CANCELLED = 22;
  // An immediate deletion was executed.
  AUDIT_EVENT_TYPE_DELETION_IMMEDIATE = 23;

  // ── Organization / SSO ───────────────────────────────────────────────────
  // An SSO provider was configured.
  AUDIT_EVENT_TYPE_SSO_CONFIGURED = 11;
  // An SSO provider was created.
  AUDIT_EVENT_TYPE_SSO_PROVIDER_CREATED = 24;
  // An SSO provider was deleted.
  AUDIT_EVENT_TYPE_SSO_PROVIDER_DELETED = 25;
  // Organization settings were updated.
  AUDIT_EVENT_TYPE_ORG_UPDATED = 26;

  // ── Roles ────────────────────────────────────────────────────────────────
  // A role was created.
  AUDIT_EVENT_TYPE_ROLE_CREATED = 27;
  // A role's name or permissions were updated.
  AUDIT_EVENT_TYPE_ROLE_UPDATED = 28;
  // A role was deleted.
  AUDIT_EVENT_TYPE_ROLE_DELETED = 29;

  // ── Templates ────────────────────────────────────────────────────────────
  // A template was created.
  AUDIT_EVENT_TYPE_TEMPLATE_CREATED = 30;
  // A template was updated.
  AUDIT_EVENT_TYPE_TEMPLATE_UPDATED = 31;

  // ── API Keys ─────────────────────────────────────────────────────────────
  // An API key was created.
  AUDIT_EVENT_TYPE_API_KEY_CREATED = 32;
  // An API key was revoked.
  AUDIT_EVENT_TYPE_API_KEY_REVOKED = 33;

  // ── Invite Links ─────────────────────────────────────────────────────────
  // An invite link was created.
  AUDIT_EVENT_TYPE_INVITE_LINK_CREATED = 34;
  // An invite link was revoked.
  AUDIT_EVENT_TYPE_INVITE_LINK_REVOKED = 35;

  // ── Groups ───────────────────────────────────────────────────────────────
  // A group was created.
  AUDIT_EVENT_TYPE_GROUP_CREATED = 36;
  // A group was updated.
  AUDIT_EVENT_TYPE_GROUP_UPDATED = 37;
  // A group was deleted.
  AUDIT_EVENT_TYPE_GROUP_DELETED = 38;
  // Members were added to a group.
  AUDIT_EVENT_TYPE_GROUP_MEMBERS_ADDED = 39;
  // Members were removed from a group.
  AUDIT_EVENT_TYPE_GROUP_MEMBERS_REMOVED = 40;

  // ── Teams ────────────────────────────────────────────────────────────────
  // A team was created.
  AUDIT_EVENT_TYPE_TEAM_CREATED = 41;
  // A team was updated.
  AUDIT_EVENT_TYPE_TEAM_UPDATED = 42;
  // A team was deleted.
  AUDIT_EVENT_TYPE_TEAM_DELETED = 43;
  // Members were added to a team.
  AUDIT_EVENT_TYPE_TEAM_MEMBERS_ADDED = 44;
  // Members were removed from a team.
  AUDIT_EVENT_TYPE_TEAM_MEMBERS_REMOVED = 45;

  // ── SCIM Provisioning ───────────────────────────────────────────────────
  // A user was provisioned via SCIM.
  AUDIT_EVENT_TYPE_SCIM_USER_PROVISIONED = 46;
  // A user was deprovisioned via SCIM.
  AUDIT_EVENT_TYPE_SCIM_USER_DEPROVISIONED = 47;
  // A user was updated via SCIM.
  AUDIT_EVENT_TYPE_SCIM_USER_UPDATED = 48;

  // ── Translations ────────────────────────────────────────────────────────
  // A template translation was created.
  AUDIT_EVENT_TYPE_TRANSLATION_CREATED = 49;
  // A template translation was approved.
  AUDIT_EVENT_TYPE_TRANSLATION_APPROVED = 50;

  // ── Sandbox Orgs ────────────────────────────────────────────────────────
  // A sandbox organization was created.
  AUDIT_EVENT_TYPE_SANDBOX_CREATED = 51;
  // A sandbox organization expired and was deleted.
  AUDIT_EVENT_TYPE_SANDBOX_EXPIRED = 52;

  // ── AI/Insights ─────────────────────────────────────────────────────────
  // An AI prediction was served and logged (EU AI Act Art. 12).
  AUDIT_EVENT_TYPE_AI_PREDICTION_LOGGED = 53;
}

// Format for audit trail export.
enum AuditExportFormat {
  // Default value; should not be used explicitly.
  AUDIT_EXPORT_FORMAT_UNSPECIFIED = 0;
  // Comma-separated values.
  AUDIT_EXPORT_FORMAT_CSV = 1;
  // JSON lines format.
  AUDIT_EXPORT_FORMAT_JSON = 2;
  // Apache Parquet columnar format.
  AUDIT_EXPORT_FORMAT_PARQUET = 3;
}

// ─── Messages ───────────────────────────────────────────────────────────────

// An immutable audit event capturing a significant platform action.
// Audit events are append-only — they cannot be updated or deleted.
message AuditEvent {
  // Unique identifier for this audit event.
  // Constraints: UUID format (36 characters).
  string id = 1;
  // Organization in which the event occurred.
  // Constraints: UUID format (36 characters).
  string org_id = 2;
  // User who performed the action. Empty for system-initiated events.
  // Constraints: UUID format (36 characters) when present.
  string actor_id = 3;
  // Type of action that was performed.
  AuditEventType event_type = 4;
  // Type of entity affected (e.g., "campaign", "user", "template").
  // Constraints: Max length 50 characters.
  string entity_type = 5;
  // Identifier of the entity affected.
  // Constraints: UUID format (36 characters).
  string entity_id = 6;
  // Additional context about the event (e.g., old/new values for changes).
  // Constraints: Max 20 key-value pairs, keys max 50 chars, values max 500 chars.
  map<string, string> metadata = 7;
  // Timestamp when the event was recorded.
  google.protobuf.Timestamp created_at = 10;
}

// Request to list audit events with optional filters.
// Auth: Requires JWT. Admin only.
message ListAuditEventsRequest {
  // Pagination token from a previous response.
  string page_token = 1;
  // Maximum number of events to return.
  // Constraints: Min 1, max 100. Default 50.
  int32 page_size = 2;
  // Optional filter: only return events of this type.
  AuditEventType event_type = 3;
  // Optional filter: only return events by this actor.
  // Constraints: UUID format (36 characters).
  string actor_id = 4;
  // Optional filter: events after this timestamp (inclusive).
  google.protobuf.Timestamp start_time = 5;
  // Optional filter: events before this timestamp (exclusive).
  google.protobuf.Timestamp end_time = 6;
}

// Response containing a paginated list of audit events.
message ListAuditEventsResponse {
  // Audit events matching the request filters.
  repeated AuditEvent events = 1;
  // Token for fetching the next page. Empty when no more events.
  string next_page_token = 2;
}

// Request to export the audit trail to S3 in a specified format.
// Auth: Requires JWT. Admin only.
message ExportAuditTrailRequest {
  // Export format.
  AuditExportFormat format = 1;
  // Optional: export events after this timestamp.
  google.protobuf.Timestamp start_time = 2;
  // Optional: export events before this timestamp.
  google.protobuf.Timestamp end_time = 3;
}

// Response containing the export download URL.
message ExportAuditTrailResponse {
  // Pre-signed S3 URL to download the exported audit trail.
  // Only populated when status is COMPLETED.
  string export_url = 1;
  // Current status of the export request.
  PrivacyRequestStatus status = 2;
}

// A persistent record of an audit trail export request.
message AuditExport {
  // Unique identifier.
  string id = 1;
  // Export format (csv, json).
  string format = 2;
  // Current status.
  PrivacyRequestStatus status = 3;
  // Pre-signed download URL. Only populated when status is COMPLETED.
  string result_url = 4;
  // Error message if the export failed.
  string error_message = 5;
  // Email of the admin who requested the export.
  string requested_by_email = 6;
  // When the export was requested.
  google.protobuf.Timestamp created_at = 7;
  // When the export completed (if applicable).
  google.protobuf.Timestamp completed_at = 8;
}

// Request to list audit export history.
// Auth: Requires JWT. Admin only.
message ListAuditExportsRequest {}

// Response containing the list of audit exports.
message ListAuditExportsResponse {
  // Audit export records, newest first.
  repeated AuditExport exports = 1;
}

// ─── Service ────────────────────────────────────────────────────────────────

// AuditService provides read access to the append-only audit trail.
// All RPCs extract org_id from the JWT — it is never in request messages.
service AuditService {
  // List audit events with optional filtering by event type, actor, and date range.
  // Results are ordered by created_at descending (newest first).
  // Auth: Requires JWT. Admin only.
  rpc ListAuditEvents(ListAuditEventsRequest) returns (ListAuditEventsResponse);

  // Export the audit trail to S3 in CSV, JSON, or Parquet format.
  // Creates a persistent record and starts an async Temporal workflow.
  // Auth: Requires JWT. Admin only.
  rpc ExportAuditTrail(ExportAuditTrailRequest) returns (ExportAuditTrailResponse);

  // List audit export history for the organization.
  // Auth: Requires JWT. Admin only.
  rpc ListAuditExports(ListAuditExportsRequest) returns (ListAuditExportsResponse);
}
