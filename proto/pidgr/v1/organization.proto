syntax = "proto3";

package pidgr.v1;

option go_package = "github.com/pidgr/pidgr-proto/gen/go/pidgr/v1;pidgrv1";

import "google/protobuf/timestamp.proto";
import "pidgr/v1/common.proto";
import "pidgr/v1/user.proto";

// ─── Enums ───────────────────────────────────────────────────────────────────

// Industry vertical for an organization.
enum Industry {
  INDUSTRY_UNSPECIFIED   = 0;
  INDUSTRY_TECHNOLOGY    = 1;
  INDUSTRY_FINANCE       = 2;
  INDUSTRY_HEALTHCARE    = 3;
  INDUSTRY_EDUCATION     = 4;
  INDUSTRY_RETAIL        = 5;
  INDUSTRY_MANUFACTURING = 6;
  INDUSTRY_MEDIA         = 7;
  INDUSTRY_OTHER         = 8;
}

// Employee headcount range for an organization.
enum CompanySize {
  COMPANY_SIZE_UNSPECIFIED = 0;
  COMPANY_SIZE_1_200      = 1;
  COMPANY_SIZE_200_500    = 2;
  COMPANY_SIZE_500_1000   = 3;
  COMPANY_SIZE_1000_5000  = 4;
  COMPANY_SIZE_5000_PLUS  = 5;
}

// Classification of an organization's lifecycle type.
enum OrgType {
  ORG_TYPE_UNSPECIFIED = 0;
  ORG_TYPE_STANDARD = 1;
  ORG_TYPE_SANDBOX = 2;
  // Reserved for platform operations. At most one per deployment, seeded
  // by migration. Cannot be created via CreateOrganization.
  ORG_TYPE_STAFF = 3;
}

// ─── Messages ───────────────────────────────────────────────────────────────

// Maps an identity provider claim to a user profile field.
// Used for automatic profile population when users authenticate via SSO/SAML.
message SsoAttributeMapping {
  // Claim name from the identity provider (e.g. "urn:oid:2.5.4.11", "given_name").
  // Constraints: Max length 500 characters.
  string idp_claim = 1;
  // Target UserProfile field name (e.g. "department", "first_name").
  // For custom attributes, use "custom:" prefix (e.g. "custom:cost_center").
  // Constraints: Max length 100 characters.
  string profile_field = 2;
}

// An organization (tenant) in the Pidgr platform.
message Organization {
  // Unique identifier for the organization.
  string id = 1;
  // Organization display name.
  // Constraints: Max length 200 characters.
  string name = 2;
  // Default workflow used when campaigns don't specify one.
  WorkflowDefinition default_workflow = 3;
  // Timestamp when the organization was created.
  google.protobuf.Timestamp created_at = 4;
  // Industry vertical.
  Industry industry = 5;
  // Employee headcount range.
  CompanySize company_size = 6;
  // SSO identity provider claim-to-profile mappings.
  // Empty when the organization does not use SSO.
  repeated SsoAttributeMapping sso_attribute_mappings = 7;
  // Default language for new users in this organization.
  // Empty means no org default (users auto-detect from device/browser).
  // Valid values: en, es, pt-BR, zh, ja.
  string default_locale = 8;
  // Organization lifecycle type.
  OrgType org_type = 9;
  // Expiration time for sandbox organizations. Empty for standard orgs.
  google.protobuf.Timestamp expires_at = 10;
  // Data governance framework (EU, LATAM, BR, APAC, US).
  // Determines legal framework, DPA template, and Bedrock endpoint routing.
  string data_governance_region = 11;
  // AWS region for content storage (resolved from data_governance_region).
  // e.g., "eu-west-1", "us-east-1".
  string data_content_region = 12;
  // ─── ML pipeline settings ──────────────────────────────────────────────────
  // Cold-start threshold: completed campaigns below this count trigger immediate
  // retraining. At or above, the org is flagged for the weekly cron.
  // Default 10, range 1-100.
  int32 ml_retrain_cold_threshold = 13;
  // Whether cancelled campaigns count toward the training counter. Default true.
  bool ml_cancelled_counts = 14;
  // Monthly limit on manual retrain triggers. Default 3, range 0-10.
  int32 ml_manual_limit_monthly = 15;
  // Number of manual retrains used in the current month (resets monthly).
  int32 ml_manual_retrains_used = 16;
  // Whether the org is flagged for the next weekly cron run.
  bool ml_needs_retrain = 17;
  // Campaigns completed since the last ML training run.
  int32 campaigns_since_last_training = 18;
  // Total campaigns completed across the organization lifetime.
  int32 total_completed_campaigns = 19;
  // Timestamp of the most recent successful ML training. Empty if never trained.
  google.protobuf.Timestamp last_ml_training_at = 20;
}

// Request to create a new organization.
// JWT auth only — the authenticated caller becomes the initial admin. Additional
// admins are added via CreateInviteLink after the org exists.
message CreateOrganizationRequest {
  // Name for the new organization.
  // Constraints: Max length 200 characters.
  string name = 1;
  // Industry vertical for the organization.
  Industry industry = 2;
  // Employee headcount range.
  CompanySize company_size = 3;
  // Access code required during early access.
  // Format: PIDGR-XXXXXXXX (8 alphanumeric characters).
  string access_code = 4;
  // Data governance framework. Defaults to "US" if omitted.
  // Valid values: EU, LATAM, BR, APAC, US.
  string data_governance_region = 5;
}

// Response after creating an organization.
message CreateOrganizationResponse {
  // The newly created organization.
  Organization organization = 1;
  // The admin user created for the organization.
  User admin_user = 2;
}

// Request to retrieve the organization for the authenticated user.
message GetOrganizationRequest {}

// Response containing the organization.
message GetOrganizationResponse {
  // The organization the authenticated user belongs to.
  Organization organization = 1;
}

// Request to update organization settings.
message UpdateOrganizationRequest {
  // New organization name. Empty string leaves unchanged.
  // Constraints: Max length 200 characters.
  string name = 1;
  // New default workflow definition. Null leaves unchanged.
  WorkflowDefinition default_workflow = 2;
  // New industry vertical. UNSPECIFIED leaves unchanged.
  Industry industry = 3;
  // New employee headcount range. UNSPECIFIED leaves unchanged.
  CompanySize company_size = 4;
  // New default language for new users. Empty string leaves unchanged.
  // Valid values: en, es, pt-BR, zh, ja.
  string default_locale = 5;
  // New ML cold-start threshold. 0 leaves unchanged, otherwise must be in [1, 100].
  int32 ml_retrain_cold_threshold = 6;
  // New ML cancelled-counts flag. Uses google.protobuf.BoolValue-style semantics
  // via optional to distinguish "not provided" from "set to false".
  optional bool ml_cancelled_counts = 7;
  // New ML monthly manual limit. Negative leaves unchanged, otherwise must be in [0, 10].
  // Encoded as int32 with -1 meaning "leave unchanged".
  int32 ml_manual_limit_monthly = 8;
}

// Response after updating the organization.
message UpdateOrganizationResponse {
  // The updated organization.
  Organization organization = 1;
}

// Request to replace all SSO attribute mappings for the organization.
message UpdateSsoAttributeMappingsRequest {
  // Complete list of SSO mappings (replaces all existing mappings).
  repeated SsoAttributeMapping sso_attribute_mappings = 1;
}

// Response after updating SSO attribute mappings.
message UpdateSsoAttributeMappingsResponse {
  // The updated organization with the new SSO mappings.
  Organization organization = 1;
}

// Request to rotate the analytics salt and optionally increase the bucket count.
message RotateAnalyticsSaltRequest {
  // New bucket count. Must be >= current bucket count. 0 means keep current.
  int32 new_bucket_count = 1;
}

// Response after rotating the analytics salt.
message RotateAnalyticsSaltResponse {
  // The new bucket count after rotation.
  int32 bucket_count = 1;
}

// Request to update the analytics epsilon (differential privacy parameter).
message UpdateAnalyticsEpsilonRequest {
  // New epsilon value. Must be in range [0.5, 5.0].
  float epsilon = 1;
}

// Response after updating the analytics epsilon.
message UpdateAnalyticsEpsilonResponse {
  // The new epsilon value.
  float epsilon = 1;
}

// Request to create a sandbox organization for testing.
message CreateSandboxOrganizationRequest {
  // Name for the sandbox organization.
  // Constraints: Max length 200 characters.
  string name = 1;
  // Required expiration time. Max 30 days from now for interactive callers;
  // API-key callers may set shorter TTLs for ephemeral test sandboxes.
  google.protobuf.Timestamp expires_at = 2;
  // Data governance framework. Defaults to "US" if omitted.
  // Valid values: EU, LATAM, BR, APAC, US.
  string data_governance_region = 3;
  // Optional fixture to seed the sandbox with sample data (templates,
  // workflows, historical campaigns). Empty string means no seeding.
  // Must match an id returned by ListSandboxFixtures.
  string fixture_id = 4;
}

// Response after creating a sandbox organization.
message CreateSandboxOrganizationResponse {
  // The newly created sandbox organization (org_type: SANDBOX).
  Organization organization = 1;
  // The admin user created for the sandbox.
  User admin_user = 2;
}

// Request to delete a sandbox organization. Only callable for orgs with
// org_type=SANDBOX. Allowed for super admins of the sandbox or the creator.
message DeleteSandboxOrganizationRequest {
  // ID of the sandbox organization to delete.
  string org_id = 1;
}

// Response after requesting deletion. Deletion runs asynchronously via
// the DeleteOrgWorkflow; a success response means the workflow started.
message DeleteSandboxOrganizationResponse {
  // ID of the Temporal workflow handling the deletion.
  string workflow_id = 1;
}

// A seed fixture that can be applied when creating a sandbox organization.
message SandboxFixture {
  // Stable UUID for referencing this fixture.
  string id = 1;
  // Display name for admin UI (e.g. "Sample data").
  string name = 2;
  // Description shown alongside the fixture option in the UI.
  string description = 3;
  // Exactly one fixture has is_default=true. Clients that show a simple
  // "fill with sample data" checkbox send this fixture's id when checked.
  bool is_default = 4;
}

// Request to list all sandbox fixtures available for seeding.
// No parameters — catalog is the same for all callers.
message ListSandboxFixturesRequest {}

// Response containing the sandbox fixture catalog.
message ListSandboxFixturesResponse {
  // All registered fixtures, ordered by name.
  repeated SandboxFixture fixtures = 1;
}

// Request to list all organizations the authenticated user belongs to.
// No parameters — user identity is extracted from the JWT sub claim.
message ListUserOrganizationsRequest {}

// Response containing all organizations the authenticated user belongs to.
message ListUserOrganizationsResponse {
  // Organizations the user belongs to, ordered by created_at ascending.
  // Excludes expired sandbox organizations.
  repeated Organization organizations = 1;
}

// Request to list only the sandbox organizations the authenticated user
// belongs to (i.e. orgs where org_type = SANDBOX, filtered from the full
// membership set). No parameters — user identity is extracted from the JWT
// sub claim.
message ListUserSandboxesRequest {}

// Response containing the user's sandbox organizations.
message ListUserSandboxesResponse {
  // Sandbox organizations the user belongs to, ordered by expires_at
  // ascending (soonest-expiring first — matches the admin UI
  // /organization/sandboxes ordering). Excludes already-expired sandboxes
  // (those are pending cleanup by SandboxCleanupWorkflow).
  repeated Organization sandboxes = 1;
}

// ─── Service ────────────────────────────────────────────────────────────────

// Manages organizations (tenants) in the Pidgr platform.
// Most RPCs operate within the caller's org (extracted from JWT).
// CreateOrganization supports API key auth or JWT auth (self-service onboarding).
service OrganizationService {
  // Create a new organization. JWT auth only — the caller becomes the initial
  // admin. Add further admins via CreateInviteLink.
  // Authorization: Authenticated user (no specific permission required).
  rpc CreateOrganization(CreateOrganizationRequest) returns (CreateOrganizationResponse);
  // Retrieve the organization for the authenticated user.
  // Authorization: Requires PERMISSION_ORG_READ.
  rpc GetOrganization(GetOrganizationRequest) returns (GetOrganizationResponse);
  // Update organization settings (name, default workflow, industry, company size).
  // Authorization: Requires PERMISSION_ORG_WRITE.
  rpc UpdateOrganization(UpdateOrganizationRequest) returns (UpdateOrganizationResponse);
  // Replace all SSO attribute mappings for the organization.
  // Authorization: Requires PERMISSION_ORG_WRITE.
  rpc UpdateSsoAttributeMappings(UpdateSsoAttributeMappingsRequest) returns (UpdateSsoAttributeMappingsResponse);
  // Rotate the analytics salt and optionally increase the bucket count for k-anonymization.
  // Authorization: Requires PERMISSION_PRIVACY_WRITE.
  rpc RotateAnalyticsSalt(RotateAnalyticsSaltRequest) returns (RotateAnalyticsSaltResponse);
  // Update the differential privacy epsilon parameter.
  // Authorization: Requires PERMISSION_PRIVACY_WRITE.
  rpc UpdateAnalyticsEpsilon(UpdateAnalyticsEpsilonRequest) returns (UpdateAnalyticsEpsilonResponse);
  // Create a sandbox organization for testing configurations.
  // Sandbox orgs auto-delete after expires_at. The caller becomes super admin.
  // Authorization: Any authenticated user. Limited to 3 concurrent sandboxes
  // per user to prevent abuse.
  rpc CreateSandboxOrganization(CreateSandboxOrganizationRequest) returns (CreateSandboxOrganizationResponse);
  // Delete a sandbox organization immediately. Starts the DeleteOrgWorkflow
  // which handles cleanup across DB, Cognito, S3, Temporal, and regional
  // content stores.
  // Authorization: Super admin of the target sandbox OR its creator.
  rpc DeleteSandboxOrganization(DeleteSandboxOrganizationRequest) returns (DeleteSandboxOrganizationResponse);
  // List sandbox fixtures available for seeding new sandbox orgs. The catalog
  // is backend-owned; admin UI populates the "fill with sample data" checkbox
  // or dropdown from this response.
  // Authorization: Any authenticated user.
  rpc ListSandboxFixtures(ListSandboxFixturesRequest) returns (ListSandboxFixturesResponse);
  // List all organizations the authenticated user belongs to.
  // Org-exempt: callable without org context (only requires valid JWT).
  // Used by the admin org switcher to discover available orgs.
  // Excludes expired sandbox organizations.
  // Authorization: Authenticated user (no specific permission required).
  rpc ListUserOrganizations(ListUserOrganizationsRequest) returns (ListUserOrganizationsResponse);
  // List only the sandbox organizations the authenticated user belongs to.
  // Org-exempt: callable without org context. The admin UI's /sandboxes
  // management page is the primary consumer — it's a user-level surface
  // rather than org-scoped, so this RPC is user-scoped too.
  // Excludes already-expired sandboxes (pending cleanup).
  // Authorization: Authenticated user (no specific permission required).
  rpc ListUserSandboxes(ListUserSandboxesRequest) returns (ListUserSandboxesResponse);
}
