name: CodeQL

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'
      - '.gitignore'
      - '.editorconfig'
      - 'CODEOWNERS'
      - '.github/CODEOWNERS'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'
      - '.gitignore'
      - '.editorconfig'
      - 'CODEOWNERS'
      - '.github/CODEOWNERS'
  schedule:
    - cron: "0 6 * * 1"

permissions:
  actions: read
  security-events: write
  contents: read

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          go-version-file: gen/go/go.mod
          cache-dependency-path: gen/go/go.sum

      - name: Initialize CodeQL
        uses: github/codeql-action/init@9da17a5aa4abec2340d6e6c8d8efb0770b1c9cb8 # v4.32.3
        with:
          languages: go

      - name: Build generated Go code
        working-directory: gen/go
        run: go build ./...

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@9da17a5aa4abec2340d6e6c8d8efb0770b1c9cb8 # v4.32.3
