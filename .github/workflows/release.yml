name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Bump, Tag & Publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine next version
        id: version
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 --match "v*" 2>/dev/null || echo "v0.0.0")
          VERSION="${LATEST_TAG#v}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)
          NEXT_PATCH=$((PATCH + 1))
          NEXT_VERSION="${MAJOR}.${MINOR}.${NEXT_PATCH}"
          echo "version=$NEXT_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v${NEXT_VERSION}" >> "$GITHUB_OUTPUT"
          echo "previous_tag=$LATEST_TAG" >> "$GITHUB_OUTPUT"
          echo "Bumping $LATEST_TAG → v${NEXT_VERSION}"

      - uses: bufbuild/buf-setup-action@v1

      - name: Generate code
        run: buf generate

      - name: Bump gen/ts/package.json
        run: |
          cd gen/ts
          npm version "${{ steps.version.outputs.version }}" --no-git-tag-version

      - name: Bump gen/rust/Cargo.toml
        run: |
          sed -i "s/^version = \".*\"/version = \"${{ steps.version.outputs.version }}\"/" gen/rust/Cargo.toml

      - name: Commit version bumps
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gen/ docs/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: release ${{ steps.version.outputs.tag }}"
            git push origin HEAD:main
          fi

      - name: Create tags
        run: |
          git tag -a "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.tag }}"
          git tag -a "gen/go/${{ steps.version.outputs.tag }}" -m "Go module ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}" "gen/go/${{ steps.version.outputs.tag }}"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://npm.pkg.github.com"

      - name: Publish npm package
        working-directory: gen/ts
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --generate-notes \
            --notes-start-tag "${{ steps.version.outputs.previous_tag }}" \
            --title "${{ steps.version.outputs.tag }}"
