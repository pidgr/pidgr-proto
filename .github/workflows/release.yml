name: Release

on:
  pull_request:
    branches: [main]
    types: [closed]

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Tag & Publish
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'release/')
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Extract version from branch name
        id: version
        run: |
          BRANCH="${{ github.event.pull_request.head.ref }}"
          VERSION="${BRANCH#release/}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Releasing v${VERSION} from branch $BRANCH"

      - name: Verify version consistency
        run: |
          TS_VERSION=$(node -p "require('./gen/ts/package.json').version")
          RUST_VERSION=$(grep '^version' gen/rust/Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          EXPECTED="${{ steps.version.outputs.version }}"
          ERRORS=0
          if [ "$TS_VERSION" != "$EXPECTED" ]; then
            echo "ERROR: gen/ts/package.json version ($TS_VERSION) != branch version ($EXPECTED)"
            ERRORS=1
          fi
          if [ "$RUST_VERSION" != "$EXPECTED" ]; then
            echo "ERROR: gen/rust/Cargo.toml version ($RUST_VERSION) != branch version ($EXPECTED)"
            ERRORS=1
          fi
          if [ "$ERRORS" -eq 1 ]; then
            exit 1
          fi
          echo "All package versions match: $EXPECTED"

      - uses: bufbuild/buf-setup-action@a47c93e0b1648d5651a065437926377d060baa99 # v1

      - name: Generate code
        run: buf generate

      - name: Commit generated code if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gen/ docs/
          if git diff --staged --quiet; then
            echo "No generated code changes"
          else
            git commit -m "chore: generate code for ${{ steps.version.outputs.tag }}"
            git push origin HEAD:main
          fi

      - name: Create tags
        run: |
          git tag -a "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.tag }}"
          git tag -a "gen/go/${{ steps.version.outputs.tag }}" -m "Go module ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}" "gen/go/${{ steps.version.outputs.tag }}"

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          registry-url: "https://npm.pkg.github.com"

      - name: Publish npm package
        working-directory: gen/ts
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 "${{ steps.version.outputs.tag }}^" --match "v*" 2>/dev/null || echo "")
          NOTES_FLAG=""
          if [ -n "$PREV_TAG" ]; then
            NOTES_FLAG="--notes-start-tag $PREV_TAG"
          fi
          gh release create "${{ steps.version.outputs.tag }}" \
            --generate-notes \
            $NOTES_FLAG \
            --title "${{ steps.version.outputs.tag }}"
