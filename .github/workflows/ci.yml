name: CI

on:
  push:
    branches:
      - "**"
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'
      - '.gitignore'
      - '.editorconfig'
      - 'CODEOWNERS'
      - '.github/CODEOWNERS'
  pull_request:
    types: [opened, synchronize, reopened]
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'
      - '.gitignore'
      - '.editorconfig'
      - 'CODEOWNERS'
      - '.github/CODEOWNERS'

permissions:
  contents: read
  pull-requests: write

jobs:
  buf:
    name: Buf Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: bufbuild/buf-action@8f4a1456a0ab6a1eb80ba68e53832e6fcfacc16c # v1.3.0
        with:
          push: false
          format: false
          breaking: false

      - name: Check if main has proto files
        if: github.event_name == 'pull_request'
        id: check_main
        run: |
          if git ls-tree -r origin/main --name-only | grep -q '\.proto$'; then
            echo "has_protos=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_protos=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: bufbuild/buf-action@8f4a1456a0ab6a1eb80ba68e53832e6fcfacc16c # v1.3.0
        if: github.event_name == 'pull_request' && steps.check_main.outputs.has_protos == 'true'
        with:
          push: false
          format: false
          build: false
          lint: false
          breaking: true
          breaking_against: origin/main
