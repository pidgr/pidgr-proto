name: CI

on:
  push:
    branches:
      - "**"
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'
      - '.gitignore'
      - '.editorconfig'
      - 'CODEOWNERS'
      - '.github/CODEOWNERS'
  pull_request:
    types: [opened, synchronize, reopened]
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'
      - '.gitignore'
      - '.editorconfig'
      - 'CODEOWNERS'
      - '.github/CODEOWNERS'

permissions:
  contents: read
  pull-requests: write

jobs:
  buf:
    name: Buf Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: bufbuild/buf-action@fd21066df7214747548607aaa45548ba2b9bc1ff # v1.4.0
        with:
          push: false
          # format=true runs `buf format --diff --exit-code` — read-only,
          # fails the job if files differ from canonical form, but does
          # not mutate files in the runner. Authors are expected to run
          # `buf format -w .` locally before pushing.
          format: true
          breaking: false

      - name: Check if main has proto files
        if: github.event_name == 'pull_request'
        id: check_main
        run: |
          if git ls-tree -r origin/main --name-only | grep -q '\.proto$'; then
            echo "has_protos=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_protos=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: bufbuild/buf-action@fd21066df7214747548607aaa45548ba2b9bc1ff # v1.4.0
        if: github.event_name == 'pull_request' && steps.check_main.outputs.has_protos == 'true'
        with:
          push: false
          format: false
          build: false
          lint: false
          breaking: true
          breaking_against: origin/main
