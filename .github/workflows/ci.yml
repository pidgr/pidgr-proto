name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  buf:
    name: Buf Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: bufbuild/buf-action@v1
        with:
          push: false
          format: false
          breaking_against: origin/main
