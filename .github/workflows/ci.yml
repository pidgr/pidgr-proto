name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  buf:
    name: Buf Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: bufbuild/buf-action@4ceee320c664d3bebaf58ed0f5f189954164e203 # v1
        with:
          push: false
          format: false
          breaking: false

      - name: Check if main has proto files
        if: github.event_name == 'pull_request'
        id: check_main
        run: |
          if git ls-tree -r origin/main --name-only | grep -q '\.proto$'; then
            echo "has_protos=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_protos=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: bufbuild/buf-action@4ceee320c664d3bebaf58ed0f5f189954164e203 # v1
        if: github.event_name == 'pull_request' && steps.check_main.outputs.has_protos == 'true'
        with:
          push: false
          format: false
          build: false
          lint: false
          breaking: true
          breaking_against: origin/main
